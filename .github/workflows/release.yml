name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g., v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve release tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi

          if [[ ! "${tag}" =~ ^v ]]; then
            echo "::error::tag must start with 'v', got: ${tag}"
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build (linux/${{ matrix.goarch }})
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      
      - name: Build archive
        id: pack
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail

          mkdir -p dist
          base="hoa-news_${TAG}_${GOOS}_${GOARCH}"
          bin="${base}"

          GOOS="${GOOS}" GOARCH="${GOARCH}" CGO_ENABLED="${CGO_ENABLED}" \
            go build -trimpath -ldflags="-s -w" -o "dist/${bin}" ./cmd/main.go

          archive="${base}.tar.gz"
          tar -C dist -czf "dist/${archive}" "${bin}"

          rm -f "dist/${bin}"
          echo "archive=dist/${archive}" >> "${GITHUB_OUTPUT}"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ matrix.goarch }}
          path: ${{ steps.pack.outputs.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS

      - name: Publish release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/*
